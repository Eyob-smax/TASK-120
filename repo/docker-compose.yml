services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "4173:4173"
    environment:
      - NODE_ENV=production

  test:
    build:
      context: ./frontend
      dockerfile: Dockerfile.test
    profiles:
      - test

  e2e:
    build:
      context: ./frontend
      dockerfile: Dockerfile.e2e
    profiles:
      - e2e
