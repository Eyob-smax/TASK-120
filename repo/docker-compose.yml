services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_PBKDF2_ITERATIONS: ${VITE_PBKDF2_ITERATIONS:-600000}
    ports:
      - "4173:4173"
    environment:
      - NODE_ENV=production

  test:
    build:
      context: ./frontend
      dockerfile: Dockerfile.test
    profiles:
      - test

  e2e:
    build:
      context: ./frontend
      dockerfile: Dockerfile.e2e
    depends_on:
      - frontend
    environment:
      - BASE_URL=http://localhost:4173
    profiles:
      - e2e
